app:
  name: OTLens
  version: 0.1.0

# Raw stdout dump of every parsed packet/ICS message — only useful
# for verifying capture/parsing against real traffic during initial
# setup. Leave false for any running deployment: it's unstructured,
# unconditional-volume console output (one line per packet), and the
# dashboard's Assets/Flows/OT Tags/Alerts tabs already show the
# structured equivalent.
debug:
  enabled: false

# Forward each alert, as it's raised, to an external server as JSON
# over HTTPS. Off by default. When first enabled, every alert that
# already existed gets sent once as a backfill (oldest first), and
# every alert raised from then on is sent as it happens. Also carries
# audit entries (see the audit: section below) to the same URL, when
# audit.enabled is also true — distinguished by a "kind" field in the
# JSON payload ("alert" vs "audit"), no separate URL/TLS needed.
export:
  enabled: false

  # https:// endpoint the alert JSON is POSTed to. TLS is what
  # actually secures this in transit — pointing this at a plain
  # http:// URL sends alert data unencrypted, which defeats the point
  # of this feature for anything beyond local testing.
  url: "https://siem.example.internal/otlens/alerts"

  tls:
    # true = don't validate the export server's TLS certificate. Only
    # for a self-signed/internal server during setup or testing —
    # leave false for anything that matters.
    insecureskipverify: false

    # Optional: path to a PEM-encoded CA certificate to trust for the
    # export server, on top of the system's normal CA pool — for an
    # internal server whose certificate chains to a private CA rather
    # than a public one. Leave empty to just use the system CA pool
    # (fine for a server with a certificate from a public CA).
    cacertfile: ""

  timeout: 10s   # per export request

capture:
  # Data source: "pcap" (live packet capture — needs Npcap/libpcap
  # installed and admin/root rights) or "ipfix" (receive flow records
  # exported by a router/switch/probe over UDP — no local capture
  # privileges needed at all). IMPORTANT: ipfix only sees flow-level
  # summaries (addresses, ports, packet/byte counts) — it never
  # carries packet payload or MAC addresses, so Modbus/S7comm
  # decoding, ARP spoofing detection, and MAC-based asset identity
  # are all unavailable in ipfix mode. Everything below "interface"
  # through "bpffilter" only applies in pcap mode.
  mode: pcap

  # Can be either the friendly description shown by `interfaces` tool
  # (e.g. "Ethernet") or the raw pcap device name
  # (e.g. \Device\NPF_{GUID} on Windows, eth0 on Linux).
  #
  # NOTE: this is a plain (unquoted) YAML scalar, so backslashes are
  # NOT escape characters here — write a single backslash, not \\.
  # (If you prefer quotes: single quotes also take it literally,
  # e.g. '\Device\NPF_{GUID}'; double quotes DO require \\ escaping.)
  interface: \Device\NPF_{4756D65C-AD35-43AF-89F4-193BEFEC3AF9}
  snaplen: 1600
  promiscuous: true
  # Optional BPF filter, e.g. "tcp or udp" to skip non-IP noise like STP/LLDP.
  bpffilter: "ip or arp"

  ipfix:
    # UDP address to receive IPFIX export packets on. 4739 is IPFIX's
    # IANA-assigned default port; point your router/switch/probe's
    # flow-export configuration at this host:port. Only used when
    # mode: ipfix.
    listenaddr: "0.0.0.0:4739"

ics:
  # Non-standard ports here if your Modbus/S7comm traffic doesn't run
  # on the standard ones. 0 (or omitted) falls back to the standard
  # port.
  modbusport: 502
  s7port: 102

baseline:
  # Whether the learning phase runs at all. true (default): learn
  # "normal" for learningduration below before alerting on anything
  # new. false: skip learning entirely — the engine starts directly
  # in monitoring mode with nothing pre-approved, so every device and
  # every communication is flagged as new right from the very first
  # packet (new_asset / new_communication alerts, red topology
  # highlighting) until manually confirmed. Set this false if the
  # network's normal baseline is already known/trusted and there's no
  # reason to wait out a learning window before real alerting starts.
  enabled: true

  # How long to learn "normal" asset-to-asset communication before
  # raising alerts for anything not seen during this window. Go
  # duration syntax, e.g. "10m", "1h", "24h". Only used when enabled
  # is true. Keep this short (e.g. 10m) while testing so you don't
  # have to wait an hour to see /alerts populate with
  # new_communication findings.
  learningduration: 10m

# Deliberately-planted decoy/honeypot stations, for lateral-movement
# detection. Nothing legitimate should ever have a real reason to
# talk to or from a genuine honeypot — any traffic touching one is
# inherently suspicious, giving a very low-false-positive signal
# compared to baseline learning's "this is new" alerts. Also usable
# more generally: assign a higher score to any asset (not just an
# actual honeypot) to weight it as more critical.
deception:
  # Score at or above which a station counts as a honeypot for
  # alerting purposes (see stations below) — not just "somewhat more
  # important than usual."
  honeypotthreshold: 100

  stations: []
    # - ip: "192.168.1.99"
    #   score: 100

detect:
  # How many consecutive conflicting ARP claims for the same IP are
  # required before treating the new MAC as the legitimate mapping
  # (debounces against a single stray/retransmitted packet). Lower is
  # more sensitive (faster alerts, more false positives from normal
  # DHCP/NIC changes); higher is slower to alert but more tolerant of
  # transient noise.
  arpconfirmthreshold: 3

store:
  # Safety caps on the value-change/control-event history kept in
  # memory between prune passes — on top of, not instead of,
  # persist.retention's time-based pruning below.
  maxvaluechanges: 1000
  maxcontrolevents: 1000

persist:
  # Path to the local SQLite database file. Assets, flows, tags, and alerts
  # are periodically snapshotted here so a restart doesn't lose
  # everything and baseline learning doesn't start over from scratch.
  path: otlens.sqlite
  # How often to flush current state to disk. Go duration syntax.
  flushinterval: 10s
  # How long to keep records (based on last-seen time) before they're
  # pruned from both memory and disk, so the database file doesn't
  # grow forever. Go duration syntax, e.g. "168h" (7 days), "720h"
  # (30 days). Set to "0" to disable pruning and keep everything —
  # not recommended long-term, especially for /flows, which grows
  # with every new client connection's ephemeral port.
  retention: 168h

api:
  host: 0.0.0.0
  port: 8080
  # "debug" (verbose gin request logging, startup warnings) or
  # "release" (quiet). Use "release" once you're done developing
  # against the API.
  mode: debug

  # Access-Control-Allow-Origin sent on every API response. Empty
  # (the default) sends no CORS header at all — only same-origin
  # requests work, which is what the bundled dashboard (served from
  # this same process under /ui) needs. Set this to a specific origin
  # only if something else genuinely needs cross-origin access — avoid
  # "*" (any origin) outside local/development use, especially if
  # username/password below are left empty: an unauthenticated API
  # with wildcard CORS lets any website a visitor's browser loads
  # read this API's responses.
  corsorigin: ""

  # HTTP Basic Auth for everything except /health. Leave both empty
  # (the default) to run unauthenticated — appropriate only when this
  # is reachable exclusively from an already-trusted network. Setting
  # only one of the two is a startup error, not a silent no-op.
  # Prefer setting the password via the OTLENS_API_PASSWORD
  # environment variable over writing it here in plaintext (any
  # OTLENS_ prefixed env var overrides its config.yaml counterpart —
  # e.g. OTLENS_API_PASSWORD overrides api.password).
  username: ""
  password: ""

  tls:
    # API is plain HTTP by default. Flip this to true to serve over
    # HTTPS instead — everything else below has a working default,
    # so enabling encryption can be as simple as this one line.
    enabled: false

    # If both files already exist, they're used as-is — point these
    # at a real CA-issued certificate if you have one. If either is
    # missing, OTLens generates a self-signed pair at these paths
    # automatically on first startup with tls.enabled: true (the
    # browser will show a one-time "not trusted" warning to click
    # past, or import otlens.crt into your OS/browser trust store).
    certfile: otlens.crt
    keyfile: otlens.key

    # Minimum TLS protocol version: "1.0", "1.1", "1.2", or "1.3".
    minversion: "1.2"

    # Optional: restrict to specific cipher suites (Go/IANA names,
    # e.g. "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256" — full list via
    # `go doc crypto/tls.CipherSuites`). Leave empty to use Go's own
    # secure defaults, which is fine for most setups. Only applies
    # when the connection negotiates TLS 1.2 or below; TLS 1.3's
    # suites are fixed by the protocol and can't be restricted here.
    ciphersuites: []

oui:
  # Optional: path to the official IEEE MA-L registry CSV
  # (https://standards-oui.ieee.org/oui/oui.csv — public, no account
  # needed) for full MAC-address vendor identification, including
  # OT/ICS vendors. Leave empty to use only the small built-in seed
  # list (VMware, VirtualBox, Hyper-V, Xen, QEMU/KVM, Raspberry Pi) —
  # see internal/oui/oui.go for why it's deliberately minimal rather
  # than guessing at OT/ICS vendor prefixes without the real
  # registry. Devices with a "locally administered" MAC (virtual
  # NICs or OS-randomized addresses) are identified as such even
  # without a database entry.
  csvpath: ""

# Known vulnerabilities (CVE) for a device's vendor, shown in a
# popup when you click an asset row in the dashboard. Offline only,
# by design — no live network calls, ever, since OT networks are
# routinely air-gapped from the internet on purpose. See
# internal/vuln and DOCUMENTATION.md section 3 for how to prepare
# datapath from CISA's public ICS Advisories feed and carry it into
# an air-gapped network.
vulnerability:
  enabled: false
  datapath: ics_advisories.csv

logging:
  # "debug", "info", "warn", or "error" — same level names zap itself
  # uses.
  level: debug
  # Where log lines are written — any combination of "stdout",
  # "stderr", or a file path. Console-only (stderr) by default;
  # uncomment/add a file path below if you're running this as a
  # background service with no visible console, or just want logs to
  # persist beyond the current session.
  output:
    - stderr
    # - otlens.log

  # In-process rotation for any file-path entries in output above
  # (stdout/stderr are never rotated). Off by default, matching the
  # original unbounded-growth behavior — turn this on if you add a
  # file path above for long-term running. Also used by audit.path
  # below, so the audit trail and the application log share the same
  # rotation behavior.
  rotation:
    enabled: false
    maxsizemb: 100      # rotate once the file reaches this size
    maxbackups: 10       # keep at most this many rotated files (0 = unlimited)
    maxagedays: 90        # delete rotated files older than this (0 = unlimited)
    compress: true          # gzip rotated files

# A separate, low-volume, high-importance trail of who did what
# through the API — admin actions (database wipe, capture stop/
# start, pcap analyze, asset confirm/delete, alert approve/confirm)
# and failed authentication attempts — distinct from the routine
# application log above. Off by default.
audit:
  enabled: false
  path: audit.log   # rotated using logging.rotation above

# Central Management connection for this Linux sensor.
central:
  # Central sensor API URL. Default deployment uses HTTPS on TCP 9443.
  url: https://central-server:9443
  # Sensor identity used during registration/heartbeat.
  sensor_id: sensor-001
  # Bearer token must match central.auth.token when Central authentication is enabled.
  token: "CHANGE_ME"
  # HTTP request timeout.
  timeout: 10s
